<!DOCTYPE html>
<html>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="highlight.css">
        <script src="highlight.js"></script>
    </head>
    <body>
        <div id='__emeltal_internal_history' style="margin-top: 7pt;"></div>
        <div id='__emeltal_internal_new'></div>
        <script>
            var lastDocHeight = 0;
            const historyElement = document.getElementById("__emeltal_internal_history");
            const newElement = document.getElementById("__emeltal_internal_new");

            function reset() {
                historyElement.innerHTML = "";
            }

            function addHistory(id, html) {
                const newDiv = document.createElement('div');
                newDiv.className = 'turn';
                newDiv.id = id;
                newDiv.innerHTML = html;
                newDiv.querySelectorAll("pre code").forEach(function(e){
                    hljs.highlightElement(e);
                });
                historyElement.appendChild(newDiv);
                return false;
            }

            function setNewText(html) {
                newElement.innerHTML = html;

                newElement.querySelectorAll("pre code").forEach(function(e){
                    hljs.highlightElement(e);
                });
                const newDocHeight = document.body.scrollHeight;
                const shouldScroll = lastDocHeight != newDocHeight;
                if (shouldScroll) {
                    lastDocHeight = newDocHeight
                    window.scrollTo(0, newDocHeight);
                }
                return shouldScroll;
            }
        </script>
    </body>
</html>
