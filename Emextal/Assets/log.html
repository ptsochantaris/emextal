<!DOCTYPE html>
<html>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="highlight.css">
        <script src="highlight.js"></script>
    </head>
    <body>
        <!-- Icon sprite: referenced from log.js via <use href="#icon-…">. Kept
             inline (not separate .svg files) so the icons inherit currentColor
             from their controls and need no asynchronous loading. -->
        <svg xmlns="http://www.w3.org/2000/svg" style="display: none" aria-hidden="true">
            <symbol id="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                <path d="M5 15V5a2 2 0 0 1 2-2h10"></path>
            </symbol>
            <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 13l4 4L19 7"></path>
            </symbol>
            <symbol id="icon-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 9l6 6 6-6"></path>
            </symbol>
            <symbol id="icon-thought" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18h6"></path>
                <path d="M10 22h4"></path>
                <path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.3h6c0-1 .4-1.8 1-2.3A7 7 0 0 0 12 2z"></path>
            </symbol>
        </svg>

        <div id='__emeltal_internal_history' style="margin-top: 7pt;"></div>
        <div id='__emeltal_internal_new'></div>
        <script src="log.js"></script>
    </body>
</html>
